<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Break Time Tracker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    /* ===== TOP HEADER ===== */

    .app-header {
      height: 78px;
      background: #ffffff;
      border-bottom: 1px solid #d5d9d9;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .amazon-logo {
      width: 115px;
      height: auto;
      display: block;
    }

    .brand-title h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      letter-spacing: 0.2px;
    }

    .brand-title p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }

    .header-status span {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      padding: 8px 12px;
      border-radius: 8px;
    }

    /* ===== MAIN LAYOUT ===== */

    .main {
      max-width: 1250px;
      margin: 24px auto;
      padding: 0 20px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d5d9d9;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      padding: 20px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 19px;
      color: #111827;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 10px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
      color: #374151;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 11px;
      font-size: 15px;
      margin-bottom: 14px;
      background: #ffffff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #ff9900;
      box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.2);
    }

    button {
      background: #ff9900;
      color: #111827;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s ease;
      font-size: 14px;
    }

    button:hover {
      background: #e88b00;
      transform: translateY(-1px);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-secondary {
      background: #232f3e;
      color: #ffffff;
    }

    .btn-secondary:hover {
      background: #1a2533;
    }

    .btn-danger {
      background: #dc2626;
      color: #ffffff;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-full {
      width: 100%;
      margin-top: 4px;
    }

    /* ===== STATS ===== */

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: #ffffff;
      border: 1px solid #d5d9d9;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .stat-box p {
      margin: 0;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }

    .stat-box h3 {
      margin: 8px 0 0;
      font-size: 28px;
      color: #111827;
    }

    .stat-on-break {
      border-left: 6px solid #ff9900;
    }

    .stat-late {
      border-left: 6px solid #dc2626;
    }

    .stat-returned {
      border-left: 6px solid #16a34a;
    }

    .stat-total {
      border-left: 6px solid #232f3e;
    }

    /* ===== TABLE ===== */

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: #232f3e;
      color: #ffffff;
      text-align: left;
      padding: 12px;
      white-space: nowrap;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }

    tr:hover {
      background: #f9fafb;
    }

    .status-pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 12px;
    }

    .status-on-break {
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fed7aa;
    }

    .status-late {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .status-returned {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    .small-note {
      font-size: 12px;
      color: #6b7280;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 950px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .app-header {
        height: auto;
        padding: 16px;
        align-items: flex-start;
        gap: 12px;
        flex-direction: column;
      }

      .header-status {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="brand">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"
        alt="Amazon Logo"
        class="amazon-logo"
      />

      <div class="brand-title">
        <h1>Break Time Tracker</h1>
        <p>KCVG Operations</p>
      </div>
    </div>

    <div class="header-status">
      <span id="currentDate">Loading date...</span>
      <span id="currentTime">Loading time...</span>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- ===== STATS ===== -->
    <section class="stats">
      <div class="stat-box stat-on-break">
        <p>ON BREAK</p>
        <h3 id="onBreakCount">0</h3>
      </div>

      <div class="stat-box stat-late">
        <p>LATE</p>
        <h3 id="lateCount">0</h3>
      </div>

      <div class="stat-box stat-returned">
        <p>RETURNED</p>
        <h3 id="returnedCount">0</h3>
      </div>

      <div class="stat-box stat-total">
        <p>TOTAL SCANS</p>
        <h3 id="totalCount">0</h3>
      </div>
    </section>

    <section class="grid">

      <!-- ===== LEFT PANEL ===== -->
      <div>

        <div class="card">
          <h2>Break Setup</h2>

          <label for="breakMinutes">Break Length</label>
          <select id="breakMinutes">
            <option value="15">15 Minutes</option>
            <option value="30" selected>30 Minutes</option>
            <option value="45">45 Minutes</option>
            <option value="60">60 Minutes</option>
          </select>

          <label for="lateGrace">Grace Period</label>
          <select id="lateGrace">
            <option value="0">No Grace</option>
            <option value="2">2 Minutes</option>
            <option value="5" selected>5 Minutes</option>
            <option value="10">10 Minutes</option>
          </select>

          <p class="small-note">
            Late time is break length plus grace period.
          </p>
        </div>

        <div class="card">
          <h2>Scan Badge</h2>

          <label for="badgeInput">Badge Number</label>
          <input
            type="text"
            id="badgeInput"
            placeholder="Scan or enter badge number"
            autocomplete="off"
          />

          <label for="nameInput">Name</label>
          <input
            type="text"
            id="nameInput"
            placeholder="Name optional"
            autocomplete="off"
          />

          <button class="btn-full" onclick="scanBadge()">Scan Badge</button>
        </div>

        <div class="card">
          <h2>Data Tools</h2>

          <div class="btn-row">
            <button class="btn-secondary" onclick="downloadData()">Download</button>
            <button class="btn-secondary" onclick="document.getElementById('uploadFile').click()">Upload</button>
            <button class="btn-danger" onclick="clearAllData()">Clear</button>
          </div>

          <input
            type="file"
            id="uploadFile"
            class="hidden-file"
            accept=".json"
            onchange="uploadData(event)"
          />
        </div>

      </div>

      <!-- ===== RIGHT PANEL ===== -->
      <div class="card">
        <h2>Break Board</h2>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Badge</th>
                <th>Name</th>
                <th>Break Start</th>
                <th>Due Back</th>
                <th>Returned</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="breakTableBody">
              <!-- Rows load here -->
            </tbody>
          </table>
        </div>
      </div>

    </section>
  </main>

  <script>
    let breakData = JSON.parse(localStorage.getItem("breakTrackerData")) || [];

    function updateHeaderClock() {
      const now = new Date();

      document.getElementById("currentDate").textContent =
        now.toLocaleDateString([], {
          weekday: "short",
          month: "short",
          day: "numeric",
          year: "numeric"
        });

      document.getElementById("currentTime").textContent =
        now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
    }

    setInterval(updateHeaderClock, 1000);
    updateHeaderClock();

    function saveData() {
      localStorage.setItem("breakTrackerData", JSON.stringify(breakData));
    }

    function scanBadge() {
      const badgeInput = document.getElementById("badgeInput");
      const nameInput = document.getElementById("nameInput");

      const badge = badgeInput.value.trim();
      const name = nameInput.value.trim();

      if (!badge) {
        alert("Scan or enter a badge number.");
        badgeInput.focus();
        return;
      }

      const activeBreak = breakData.find(item =>
        item.badge === badge && item.status !== "Returned"
      );

      if (activeBreak) {
        activeBreak.returnTime = new Date().toISOString();
        activeBreak.status = "Returned";
      } else {
        const now = new Date();

        const breakMinutes = Number(document.getElementById("breakMinutes").value);
        const graceMinutes = Number(document.getElementById("lateGrace").value);

        const dueBack = new Date(
          now.getTime() + (breakMinutes + graceMinutes) * 60000
        );

        breakData.push({
          badge: badge,
          name: name || "Unknown",
          startTime: now.toISOString(),
          dueBack: dueBack.toISOString(),
          returnTime: "",
          status: "On Break"
        });
      }

      saveData();
      renderTable();

      badgeInput.value = "";
      nameInput.value = "";
      badgeInput.focus();
    }

    function getStatus(item) {
      if (item.status === "Returned") {
        return "Returned";
      }

      const now = new Date();
      const dueBack = new Date(item.dueBack);

      if (now > dueBack) {
        return "Late";
      }

      return "On Break";
    }

    function formatTime(dateString) {
      if (!dateString) return "-";

      return new Date(dateString).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderTable() {
      const tbody = document.getElementById("breakTableBody");
      tbody.innerHTML = "";

      let onBreakCount = 0;
      let lateCount = 0;
      let returnedCount = 0;

      breakData.forEach((item, index) => {
        const status = getStatus(item);
        item.status = status;

        if (status === "On Break") onBreakCount++;
        if (status === "Late") lateCount++;
        if (status === "Returned") returnedCount++;

        let statusClass = "status-on-break";

        if (status === "Late") {
          statusClass = "status-late";
        }

        if (status === "Returned") {
          statusClass = "status-returned";
        }

        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${item.badge}</td>
          <td>${item.name}</td>
          <td>${formatTime(item.startTime)}</td>
          <td>${formatTime(item.dueBack)}</td>
          <td>${formatTime(item.returnTime)}</td>
          <td>
            <span class="status-pill ${statusClass}">
              ${status}
            </span>
          </td>
          <td>
            ${
              status !== "Returned"
                ? `<button onclick="markReturned(${index})">Return</button>`
                : `<button class="btn-danger" onclick="deleteRow(${index})">Delete</button>`
            }
          </td>
        `;

        tbody.appendChild(row);
      });

      document.getElementById("onBreakCount").textContent = onBreakCount;
      document.getElementById("lateCount").textContent = lateCount;
      document.getElementById("returnedCount").textContent = returnedCount;
      document.getElementById("totalCount").textContent = breakData.length;

      saveData();
    }

    function markReturned(index) {
      breakData[index].returnTime = new Date().toISOString();
      breakData[index].status = "Returned";

      saveData();
      renderTable();
    }

    function deleteRow(index) {
      if (!confirm("Delete this row?")) return;

      breakData.splice(index, 1);
      saveData();
      renderTable();
    }

    function clearAllData() {
      if (!confirm("Clear all break tracker data?")) return;

      breakData = [];
      saveData();
      renderTable();
    }

    function downloadData() {
      const dataStr = JSON.stringify(breakData, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "break-tracker-data.json";
      link.click();
    }

    function uploadData(event) {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const uploadedData = JSON.parse(e.target.result);

          if (!Array.isArray(uploadedData)) {
            alert("Invalid file.");
            return;
          }

          breakData = uploadedData;
          saveData();
          renderTable();

          alert("Data uploaded successfully.");
        } catch (error) {
          alert("Could not read file.");
        }
      };

      reader.readAsText(file);
    }

    document.getElementById("badgeInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        scanBadge();
      }
    });

    setInterval(renderTable, 10000);
    renderTable();
  </script>

</body>
</html>
